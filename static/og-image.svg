<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A" />
      <stop offset="100%" style="stop-color:#1E293B" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6" />
      <stop offset="100%" style="stop-color:#1D4ED8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative code lines -->
  <g opacity="0.1">
    <rect x="50" y="100" width="200" height="8" rx="4" fill="#3B82F6"/>
    <rect x="50" y="120" width="150" height="8" rx="4" fill="#3B82F6"/>
    <rect x="50" y="140" width="180" height="8" rx="4" fill="#3B82F6"/>
    <rect x="950" y="480" width="200" height="8" rx="4" fill="#3B82F6"/>
    <rect x="980" y="500" width="170" height="8" rx="4" fill="#3B82F6"/>
    <rect x="960" y="520" width="190" height="8" rx="4" fill="#3B82F6"/>
  </g>
  
  <!-- Logo box - clean square with centered </> -->
  <g transform="translate(100, 240)">
    <rect x="0" y="0" width="100" height="100" rx="16" fill="url(#accent)" />
    <text x="50" y="50" font-family="monospace" font-size="40" font-weight="bold" fill="white" text-anchor="middle" alignment-baseline="central">&lt;/&gt;</text>
  </g>
  
  <!-- Title -->
  <text x="230" y="290" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="white">ContextPacker</text>
  
  <!-- Subtitle -->
  <text x="230" y="350" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#94A3B8">Code Context API for AI Agents</text>
  
  <!-- Tagline -->
  <text x="100" y="480" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#64748B">Embedding-quality retrieval • No vector DB • Works instantly on any repo</text>
  
  <!-- Badge -->
  <rect x="100" y="520" width="180" height="36" rx="18" fill="#22C55E" opacity="0.2"/>
  <text x="130" y="545" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#22C55E">100 free credits</text>
</svg>
